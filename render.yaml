services:
  - type: web
    name: momentum-screener
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python momentum_dashboard.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: RENDER
        value: "true"
      - key: DATA_DIR
        value: "/data"
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
